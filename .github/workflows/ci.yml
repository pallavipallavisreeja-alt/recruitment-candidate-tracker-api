name: FastAPI CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: python -m pytest

      - name: Detect Controllers
        run: python detect_controllers.py

      - name: Extract Endpoints
        run: python extract_endpoints.py

      - name: Compare Endpoint Versions
        run: python compare_endpoints.py

      - name: Generate OpenAPI Spec
        run: python generate_openapi.py

      - name: Upload Generated Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openapi-artifacts
          path: |
            detected_controllers.json
            detected_endpoints.json
            endpoint_diff.json
            openapi_generated.json

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set. Skipping deploy step."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
