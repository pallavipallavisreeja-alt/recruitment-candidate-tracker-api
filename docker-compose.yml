services:
  backend:
    build: .
    environment:
      DATABASE_URL: sqlite:////app/recruitment_app.db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      REACT_APP_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      - backend
    command: sh -c "npm install && npm start"
